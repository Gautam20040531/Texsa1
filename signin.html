<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | TEXSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #000; }
        .samsung-blue { color: #007bff; }
        .bg-samsung-blue { background-color: #007bff; }
    </style>
</head>
<body class="antialiased flex items-center justify-center min-h-screen bg-gray-100">

    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md relative">
        <a href="index.html" class="absolute top-6 right-6 text-gray-400 hover:text-black transition">
            <i class="fas fa-times text-xl"></i>
        </a>
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tighter mb-2">TEXSA</h1>
            <p class="text-gray-500">Sign in to your account</p>
        </div>

        <form onsubmit="event.preventDefault(); alert('Sign In Successful!'); window.location.href='index.html';">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="email">Email Address</label>
                <input class="w-full border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-blue-500 transition" id="email" type="email" placeholder="name@example.com" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Password</label>
                <input class="w-full border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-blue-500 transition" id="password" type="password" placeholder="******************" required>
            </div>
            
            <div class="flex items-center justify-between mb-6">
                <label class="flex items-center text-sm text-gray-600">
                    <input type="checkbox" class="mr-2 leading-tight">
                    <span class="text-xs">Remember me</span>
                </label>
                <a class="inline-block align-baseline font-bold text-xs text-blue-500 hover:text-blue-800" href="#">
                    Forgot Password?
                </a>
            </div>

            <button class="w-full bg-samsung-blue text-white font-bold py-3 rounded-full hover:opacity-90 transition transform active:scale-95" type="submit">
                Sign In
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-sm text-gray-500">Don't have an account?</p>
            <a href="#" class="text-blue-600 font-bold hover:underline">Create an account</a>
        </div>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <a href="index.html" class="text-xs text-gray-400 hover:text-gray-600">Return to Home</a>
        </div>
    </div>

</body>
</html>
