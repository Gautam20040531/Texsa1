<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | TEXSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #000; }
        .samsung-blue { color: #007bff; }
        .bg-samsung-blue { background-color: #007bff; }
    </style>
</head>
<body class="antialiased flex items-center justify-center min-h-screen bg-gray-100">

    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md relative">
        <a href="index.html" class="absolute top-6 right-6 text-gray-400 hover:text-black transition">
            <i class="fas fa-times text-xl"></i>
        </a>
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tighter mb-2">TEXSA</h1>
            <p class="text-gray-500">Create New User Account</p>
        </div>

        <form onsubmit="event.preventDefault(); if(document.getElementById('robot-check').checked){ document.getElementById('success-message').classList.remove('hidden'); } else { alert('Please verify you are not a robot.'); }">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="name">Full Name</label>
                <input class="w-full border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-blue-500 transition" id="name" type="text" placeholder="John Doe" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="email">Email Address</label>
                <input class="w-full border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-blue-500 transition" id="email" type="email" placeholder="name@example.com" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Password</label>
                <input class="w-full border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-blue-500 transition" id="password" type="password" placeholder="******************" required>
            </div>
            
            <div class="mb-6 bg-gray-50 p-3 rounded-lg border border-gray-200 flex items-center">
                <input type="checkbox" id="robot-check" class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500 cursor-pointer" required>
                <label for="robot-check" class="ml-3 text-sm text-gray-700 font-medium cursor-pointer">I'm not a robot</label>
                <i class="fas fa-shield-alt text-gray-400 ml-auto"></i>
            </div>

            <button class="w-full bg-samsung-blue text-white font-bold py-3 rounded-full hover:opacity-90 transition transform active:scale-95" type="submit">
                Create Account
            </button>
        </form>

        <!-- Success Message -->
        <div id="success-message" class="hidden mt-6 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg relative text-center" role="alert">
            <strong class="font-bold">Success!</strong>
            <span class="block sm:inline">User ID created and verified successfully.</span>
        </div>

        <div class="mt-8 text-center">
            <p class="text-sm text-gray-500">Already have an account?</p>
            <a href="signin.html" class="text-blue-600 font-bold hover:underline">Sign In</a>
        </div>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <a href="index.html" class="text-xs text-gray-400 hover:text-gray-600">Return to Home</a>
        </div>
    </div>

</body>
</html>
